<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#192a40" />
      <stop offset="100%" stop-color="#0d1724" />
    </linearGradient>

    <linearGradient id="line-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(33, 184, 166, 0.15)" />
      <stop offset="100%" stop-color="rgba(33, 184, 166, 0.0)" />
    </linearGradient>

    <style>
      .headline {
        font-family: 'Inter', sans-serif;
        font-size: 56px;
        font-weight: 800;
        letter-spacing: -1px;
        fill: #ffffff;
      }

      .headline-teal {
        fill: #1FB6A6;
      }

      .services {
        font-family: 'Inter', sans-serif;
        font-size: 22px;
        fill: #1FB6A6;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      .divider { fill: #475569; }

      .font-base {
        font-family: 'Inter', sans-serif;
        font-size: 52px;
      }

      .text-navy { fill: #0F2A44; font-weight: 800; }
      .text-teal { fill: #1FB6A6; font-weight: 500; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)" />

  <!-- Decorative lines -->
  <path d="M -100 150 L 1300 -50" stroke="url(#line-gradient)" stroke-width="1.5" fill="none" />
  <path d="M -100 250 L 1300 50" stroke="url(#line-gradient)" stroke-width="1" fill="none" />
  <circle cx="600" cy="315" r="450" stroke="rgba(255,255,255,0.03)" stroke-width="1" fill="none" />

  <!-- Logo Card (NEW) -->
  <rect x="390" y="70" width="420" height="220" rx="20" fill="#ffffff" />

  <!-- Logo -->
  <svg x="390" y="70" width="420" height="220" viewBox="0 0 420 260">
    <g transform="translate(110, 40)">
      <polygon points="10,0 55,90 80,90 40,0" fill="#0F2A44"/>
      <polygon points="55,90 85,90 115,22 85,22" fill="#0F2A44"/>
      <polygon points="85,22 115,22 145,90 115,90" fill="#1FB6A6"/>
      <polygon points="115,90 160,0 190,0 145,90" fill="#1FB6A6"/>
      <circle cx="70" cy="90" r="4" fill="#0F2A44"/>
      <circle cx="100" cy="22" r="4" fill="#0F2A44"/>
      <circle cx="130" cy="90" r="4" fill="#1FB6A6"/>
    </g>

    <g transform="translate(210, 195)" text-anchor="middle">
      <text y="10" class="font-base" text-anchor="middle">
        <tspan class="text-navy">Work</tspan><tspan class="text-teal" dx="-1">Centrik</tspan>
      </text>
    </g>
  </svg>

  <!-- Headline -->
  <text x="600" y="380" class="headline" text-anchor="middle">
    Engineer Your Digital
  </text>
  <text x="600" y="450" class="headline headline-teal" text-anchor="middle">
    Unfair Advantage.
  </text>

  <!-- Services -->
  <text x="600" y="540" class="services" text-anchor="middle">
    Web Design <tspan class="divider"> • </tspan> 
    Development <tspan class="divider"> • </tspan> 
    Hosting <tspan class="divider"> • </tspan> 
    Branding <tspan class="divider"> • </tspan> 
    SEO
  </text>

</svg>