<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#192a40" />
      <stop offset="100%" stop-color="#0d1724" />
    </linearGradient>

    <linearGradient id="line-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(33, 184, 166, 0.15)" />
      <stop offset="100%" stop-color="rgba(33, 184, 166, 0.0)" />
    </linearGradient>

    <style>
      .tagline {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 46px;
        fill: #ffffff;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .services {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 24px;
        fill: #21b8a6;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }
      .divider { fill: #475569; }
      
      /* Logo Specific Styles for Dark Background 
         (Changed navy to white for contrast) 
      */
      .logo-white { fill: #ffffff; }
      .logo-teal { fill: #21b8a6; }
      .font-base {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 52px;
        letter-spacing: 0;
      }
      .text-white { fill: #ffffff; font-weight: 800; }
      .text-teal { fill: #21b8a6; font-weight: 500; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-gradient)" />

  <path d="M -100 150 L 1300 -50" stroke="url(#line-gradient)" stroke-width="1.5" fill="none" />
  <path d="M -100 250 L 1300 50" stroke="url(#line-gradient)" stroke-width="1" fill="none" />
  <circle cx="600" cy="315" r="450" stroke="rgba(255,255,255,0.03)" stroke-width="1" fill="none" />
  <circle cx="600" cy="315" r="600" stroke="rgba(255,255,255,0.02)" stroke-width="1" fill="none" />

  <svg x="390" y="100" width="420" height="260" viewBox="0 0 420 260">
    
    <g transform="translate(110, 40)">
      <polygon points="10,0 55,90 80,90 40,0" class="logo-white" />
      <polygon points="55,90 85,90 115,22 85,22" class="logo-white" />
      <polygon points="85,22 115,22 145,90 115,90" class="logo-teal" />
      <polygon points="115,90 160,0 190,0 145,90" class="logo-teal" />
      
      <circle cx="70" cy="90" r="4" class="logo-white" />
      <circle cx="100" cy="22" r="4" class="logo-white" />
      <circle cx="130" cy="90" r="4" class="logo-teal" />
    </g>

    <g transform="translate(210, 195)" text-anchor="middle">
      <text y="10" class="font-base"><tspan class="text-white">Work</tspan><tspan class="text-teal">Centrik</tspan></text>
    </g>
    </svg>
  <text x="600" y="440" class="tagline" text-anchor="middle">Building Digital Excellence in South Africa</text>
  
  <text x="600" y="520" class="services" text-anchor="middle">
    Web Design <tspan class="divider"> • </tspan> 
    Development <tspan class="divider"> • </tspan> 
    Hosting <tspan class="divider"> • </tspan> 
    Branding <tspan class="divider"> • </tspan> 
    SEO
  </text>

</svg>