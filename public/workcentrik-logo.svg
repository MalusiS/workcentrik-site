<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" fill="none" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">WorkCentrik Logo</title>

  <defs>
    <style>
      .navy { fill: #0F2A44; }
      .teal { fill: #1FB6A6; }
      .font-base {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 52px;
        letter-spacing: 0;
      }
      .text-navy {
        fill: #0F2A44;
        font-weight: 800;
      }
      .text-teal {
        fill: #1FB6A6;
        font-weight: 500;
      }
    </style>
  </defs>

  <g transform="translate(110, 40)">
    <polygon points="10,0 55,90 80,90 40,0" class="navy" />
    <polygon points="55,90 85,90 115,22 85,22" class="navy" />
    <polygon points="85,22 115,22 145,90 115,90" class="teal" />
    <polygon points="115,90 160,0 190,0 145,90" class="teal" />
    
    <circle cx="70" cy="90" r="4" class="navy" />
    <circle cx="100" cy="22" r="4" class="navy" />
    <circle cx="130" cy="90" r="4" class="teal" />
  </g>

  <g transform="translate(210, 195)" text-anchor="middle">
    <text y="10" class="font-base"><tspan class="text-navy">Work</tspan><tspan class="text-teal">Centrik</tspan></text>
  </g>
</svg>